
 <!-- This is not part of the code, but only a reference for the phase angle drawing model -->


<style>
body{margin:0}
.wrap{padding:1.5rem 0;display:flex;flex-direction:column;align-items:center;gap:1.5rem}
.row{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;align-items:flex-end}
.item{display:flex;flex-direction:column;align-items:center;gap:6px}
.item span{font-size:11px;color:var(--color-text-secondary)}
.controls{display:flex;flex-direction:column;align-items:center;gap:10px;width:min(340px,90vw)}
.readout{display:flex;gap:16px;font-size:13px;color:var(--color-text-secondary)}
.readout strong{color:var(--color-text-primary);font-weight:500}
label{font-size:13px;color:var(--color-text-secondary);align-self:flex-start}
</style>
<div class="wrap">
  <div class="row" id="presets"></div>
  <canvas id="big" width="160" height="160"></canvas>
  <div class="readout">
    <span>Angle: <strong id="angOut">90°</strong></span>
    <span>Illuminated: <strong id="pctOut">50%</strong></span>
    <span>Phase: <strong id="nameOut">Quarter</strong></span>
  </div>
  <div class="controls">
    <label>Drag to change phase angle</label>
    <input type="range" min="0" max="180" value="90" id="slider" style="width:100%">
    <div style="display:flex;justify-content:space-between;width:100%;font-size:11px;color:var(--color-text-secondary)">
      <span>0° full</span><span>90° half</span><span>180° new</span>
    </div>
  </div>
</div>
<script>
function drawPhase(canvas, angleDeg){
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2, r = cx - 3;
  ctx.clearRect(0,0,w,h);

  const angle = angleDeg * Math.PI / 180;

  // Step 1 — full dark circle (the shadow base)
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = '#1a1a2e';
  ctx.fill();

  // Step 2 — lit half: always the LEFT semicircle
  // (sun is always on the left in this model)
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI/2, -Math.PI/2, false); // left half arc
  ctx.lineTo(cx, cy);
  ctx.closePath();
  ctx.fillStyle = '#e8d5a3';
  ctx.fill();

  // Step 3 — terminator ellipse
  // This is the KEY: an ellipse whose x-radius = r*|cos(angle)|
  // At 0°  → x-radius = r   → full ellipse covers whole lit half = new moon
  // At 90° → x-radius = 0   → flat line down center = half moon  
  // At 180°→ x-radius = r   → full ellipse reveals whole lit half = full moon
  const ex = Math.abs(Math.cos(angle)) * r;

  ctx.beginPath();
  ctx.ellipse(cx, cy, ex, r, 0, 0, Math.PI*2);

  if(angleDeg < 90){
    // waxing: ellipse is dark — covers the lit half, leaving a crescent on right
    ctx.fillStyle = '#1a1a2e';
  } else {
    // waning: ellipse is lit — reveals more of the left half
    ctx.fillStyle = '#e8d5a3';
  }
  ctx.fill();

  // Step 4 — crisp outer border
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function phaseName(a){
  if(a<=5)   return 'Full';
  if(a<=45)  return 'Gibbous';
  if(a<=85)  return 'Quarter';
  if(a<=95)  return 'Half';
  if(a<=135) return 'Quarter';
  if(a<=175) return 'Crescent';
  return 'New';
}

// build preset row
const presets = [0,30,60,90,120,150,180];
const labels  = ['Full','Gibbous','Quarter','Half','Quarter','Crescent','New'];
const row = document.getElementById('presets');
presets.forEach((a,i)=>{
  const item = document.createElement('div');
  item.className = 'item';
  const c = document.createElement('canvas');
  c.width = c.height = 52;
  drawPhase(c, a);
  const lbl = document.createElement('span');
  lbl.textContent = labels[i];
  item.appendChild(c);
  item.appendChild(lbl);
  row.appendChild(item);
});

// big interactive demo
const big = document.getElementById('big');
drawPhase(big, 90);

document.getElementById('slider').addEventListener('input', function(){
  const a = +this.value;
  drawPhase(big, a);
  document.getElementById('angOut').textContent  = a + '°';
  document.getElementById('pctOut').textContent  = Math.round((1 - a/180)*100) + '%';
  document.getElementById('nameOut').textContent = phaseName(a);
});
</script>
